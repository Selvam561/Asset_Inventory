<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhiran — IT Asset Inventory</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#05080f;
  --surface:#0b1120;
  --border:#1c2e4a;
  --border2:#243a5a;
  --text:#e2e8f0;
  --muted:#4a6080;
  --teal:#00e5c8;
}

/* 🌞 Light Theme */
body.light {
  --bg:#ffffff;
  --surface:#f5f7fa;
  --border:#d0d7e2;
  --border2:#c3cedc;
  --text:#0f172a;
  --muted:#64748b;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans', sans-serif;
  margin:0;
}

/* Header */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  border-bottom:1px solid var(--border);
}

.btn {
  padding:6px 12px;
  border:1px solid var(--border2);
  background:none;
  color:var(--text);
  cursor:pointer;
  border-radius:6px;
}

/* Cards */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
  margin:20px;
  border-radius:10px;
}

h1 { color:var(--teal); }
</style>
</head>

<body>

<header>
  <h1>IT Asset Dashboard</h1>
  <button class="btn" onclick="toggleTheme()">🌙 Theme</button>
</header>

<div class="card">
  <h2>Total Systems: 25</h2>
  <p>Online: 18</p>
  <p>Offline: 7</p>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

window.onload = () => {
  if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
  }
};
</script>

</body>
</html>
